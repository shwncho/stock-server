spring:
  application:
    name: kis-stock-llm-analysis

  kafka:
    bootstrap-servers: localhost:9092

    consumer:
      group-id: stock-analysis-group

  datasource:
    url: jdbc:mysql://localhost:3306/stock_analysis?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: root
    password: 1234
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: create
    show-sql: false
  cache:
    type: redis
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080
  shutdown: graceful

# KIS API
kis:
  api:
    base-url: https://openapi.koreainvestment.com:9443
    app-key: ${KIS_APP_KEY}
    app-secret: ${KIS_APP_SECRET}
    request:
      connect-timeout: 5000
      read-timeout: 10000
    resilience:
      rate-limit:
        limit-for-period: 15        # 1초당 15건 (한도 20 대비 75% 사용)
        refresh-period-ms: 1000
        timeout-ms: 5000            # permit 대기 최대 5초 (캐시 미스 워스트 케이스 커버)
      retry:
        max-attempts: 3             # 최초 호출 + 2회 재시도
        initial-wait-ms: 300        # 1차 대기 300ms
        multiplier: 2.0             # 300ms → 600ms → 1200ms (지수 백오프)

# LLM API
llm:
  provider: gpt

  # Claude API
  claude:
    base-url: https://api.anthropic.com/v1/messages
    api-key: ${CLAUDE_API_KEY}
    model: claude-sonnet-4-20250514
    max-tokens: 2000

  # OpenAI API
  gpt:
    base-url: https://api.openai.com/v1/chat/completions
    api-key: ${OPENAI_API_KEY}
    model: gpt-4o-mini
    max-tokens: 2000


analysis:
  top-stocks: 10
  days-back: 60
  overseas:
    exchanges: NAS,NYS,AMS
#    exchanges: NAS

logging:
  level:
    root: INFO
    com.stock: DEBUG
